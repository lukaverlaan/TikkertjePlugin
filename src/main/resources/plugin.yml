name: Tikkertje
version: '1.0'
main: me.vuxaer.tikkertje.Tikkertje
api-version: '1.20'
authors: [ Vuxaer ]
description: Tikkertje (Sprookjesbos) - SprookjesCraft
softdepend: [WorldGuard]

commands:
  tikkertje:
    description: Start het tikkertje spel
    usage: /tikkertje <start|stop|help|reload|setregion|clearregion|setspawn>
    permission: tikkertje.admin

permissions:
  tikkertje.admin:
    description: Geeft toegang tot alle tikkertje commands
    default: op